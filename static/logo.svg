<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@1,700');
      .casdra-text { font-family: 'Exo 2', sans-serif; font-weight: 700; font-style: italic; }
    </style>
  </defs>

  <!-- Full rounded rect background -->
  <rect width="280" height="64" rx="14" fill="#0F172A"/>

  <!-- Bold geometric C -->
  <path d="
    M 50 18
    A 20 20 0 1 0 50 46
    L 44 46
    A 14 14 0 1 1 44 18
    Z
  " fill="url(#blueGrad)"/>

  <!-- Vertical divider -->
  <line x1="76" y1="16" x2="76" y2="48" stroke="#1E3A5F" stroke-width="1.5"/>

  <!-- "CASDRA" Exo 2 Bold Italic -->
  <text
    x="178"
    y="37"
    text-anchor="middle"
    class="casdra-text"
    font-size="26"
    letter-spacing="6"
    fill="#FFFFFF"
  >CASDRA</text>

  <!-- "SOFTWARE LLC" -->
  <text
    x="178"
    y="52"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="10"
    font-weight="500"
    letter-spacing="3.5"
    fill="#60A5FA"
  >SOFTWARE LLC</text>
</svg>
